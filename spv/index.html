  <style>

    @media (max-width: 900px) {

      .phase-row, .header-row { grid-template-columns: 40px 1fr 1fr 60px; font-size: 11px; gap: 8px; }
      .phase-row > div:nth-child(4), .header-row > div:nth-child(4),
      .phase-row > div:nth-child(5), .header-row > div:nth-child(5) { display: none; }
      .stat-card { padding: 14px; }

</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // Get Recharts components from global
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceArea, Brush } = Recharts;
    const { useState, useCallback, useMemo, useRef, useEffect } = React;

    // SVG Icons as components
    const Icons = {
      Upload: () => <svg className="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      Download: () => <svg className="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Settings: () => <svg className="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Eye: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      EyeOff: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
      Plus: () => <svg className="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash2: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Edit3: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
      Check: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      X: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      RefreshCw: () => <svg className="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
      BarChart3: () => <svg className="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
      FileText: () => <svg className="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
    };

    // Slow phase detection algorithm
    const detectSlowPhases = (data, params) => {
      if (!data || data.length < 3) return [];
      const { velocityThreshold, minDuration, smoothingWindow } = params;
      const phases = [];
      const velocities = [];
      
      for (let i = 1; i < data.length; i++) {
        const dt = data[i].time - data[i - 1].time;
        if (dt <= 0) continue;
        const vH = (data[i].horizontal - data[i - 1].horizontal) / dt;
        const vV = (data[i].vertical - data[i - 1].vertical) / dt;
        const speed = Math.sqrt(vH * vH + vV * vV);
        velocities.push({ index: i, time: data[i].time, vH, vV, speed });
      }
      
      if (velocities.length === 0) return [];
      
      const smoothed = [];
      const halfWindow = Math.floor(smoothingWindow / 2);
      for (let i = 0; i < velocities.length; i++) {
        let sumSpeed = 0, sumVH = 0, sumVV = 0, count = 0;
        for (let j = Math.max(0, i - halfWindow); j <= Math.min(velocities.length - 1, i + halfWindow); j++) {
          sumSpeed += velocities[j].speed;
          sumVH += velocities[j].vH;
          sumVV += velocities[j].vV;
          count++;
        }
        smoothed.push({ ...velocities[i], smoothedSpeed: sumSpeed / count, smoothedVH: sumVH / count, smoothedVV: sumVV / count });
      }
      
      let inSlowPhase = false, phaseStart = null;
      
      for (let i = 0; i < smoothed.length; i++) {
        const isSlow = smoothed[i].smoothedSpeed < velocityThreshold;
        if (isSlow && !inSlowPhase) {
          inSlowPhase = true;
          phaseStart = i;
        } else if (!isSlow && inSlowPhase) {
          inSlowPhase = false;
          const duration = smoothed[i - 1].time - smoothed[phaseStart].time;
          if (duration >= minDuration) {
            let sumVH = 0, sumVV = 0;
            for (let j = phaseStart; j < i; j++) { sumVH += smoothed[j].smoothedVH; sumVV += smoothed[j].smoothedVV; }
            const avgVH = sumVH / (i - phaseStart), avgVV = sumVV / (i - phaseStart);
            phases.push({ id: `phase-${phases.length}-${Date.now()}-${Math.random()}`, startTime: smoothed[phaseStart].time, endTime: smoothed[i - 1].time, duration, avgHorizontalVelocity: avgVH, avgVerticalVelocity: avgVV, avgSpeed: Math.sqrt(avgVH * avgVH + avgVV * avgVV) });
          }
          phaseStart = null;
        }
      }
      
      if (inSlowPhase && phaseStart !== null) {
        const lastIdx = smoothed.length - 1;
        const duration = smoothed[lastIdx].time - smoothed[phaseStart].time;
        if (duration >= minDuration) {
          let sumVH = 0, sumVV = 0;
          for (let j = phaseStart; j <= lastIdx; j++) { sumVH += smoothed[j].smoothedVH; sumVV += smoothed[j].smoothedVV; }
          const avgVH = sumVH / (lastIdx - phaseStart + 1), avgVV = sumVV / (lastIdx - phaseStart + 1);
          phases.push({ id: `phase-${phases.length}-${Date.now()}-${Math.random()}`, startTime: smoothed[phaseStart].time, endTime: smoothed[lastIdx].time, duration, avgHorizontalVelocity: avgVH, avgVerticalVelocity: avgVV, avgSpeed: Math.sqrt(avgVH * avgVH + avgVV * avgVV) });
        }
      }
      return phases;
    };

    const calculatePhaseVelocity = (data, startTime, endTime) => {
      const phaseData = data.filter(d => d.time >= startTime && d.time <= endTime);
      if (phaseData.length < 2) return { avgHorizontalVelocity: 0, avgVerticalVelocity: 0, avgSpeed: 0 };
      let sumVH = 0, sumVV = 0, count = 0;
      for (let i = 1; i < phaseData.length; i++) {
        const dt = phaseData[i].time - phaseData[i - 1].time;
        if (dt <= 0) continue;
        sumVH += (phaseData[i].horizontal - phaseData[i - 1].horizontal) / dt;
        sumVV += (phaseData[i].vertical - phaseData[i - 1].vertical) / dt;
        count++;
      }
      if (count === 0) return { avgHorizontalVelocity: 0, avgVerticalVelocity: 0, avgSpeed: 0 };
      const avgVH = sumVH / count, avgVV = sumVV / count;
      return { avgHorizontalVelocity: avgVH, avgVerticalVelocity: avgVV, avgSpeed: Math.sqrt(avgVH * avgVH + avgVV * avgVV) };
    };

    const CustomTooltip = ({ active, payload, label }) => {
      if (active && payload && payload.length) {
        return (
          <div style={{ background: 'rgba(15, 23, 42, 0.95)', border: '1px solid rgba(56, 189, 248, 0.3)', borderRadius: '8px', padding: '12px 16px', fontFamily: "'JetBrains Mono', monospace", fontSize: '12px' }}>
            <p style={{ color: '#94a3b8', marginBottom: '8px' }}>Time: {typeof label === 'number' ? label.toFixed(4) : label}s</p>
            {payload.map((entry, index) => (<p key={index} style={{ color: entry.color, margin: '4px 0' }}>{entry.name}: {typeof entry.value === 'number' ? entry.value.toFixed(2) : entry.value}°</p>))}
          </div>
        );
      }
      return null;
    };

    function NystagmusAnalyzer() {
      const [rawData, setRawData] = useState(null);
      const [data, setData] = useState([]);
      const [selectedEye, setSelectedEye] = useState('right');
      const [slowPhases, setSlowPhases] = useState([]);
      const [selectedPhase, setSelectedPhase] = useState(null);
      const [isAddingPhase, setIsAddingPhase] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showHorizontal, setShowHorizontal] = useState(true);
      const [showVertical, setShowVertical] = useState(true);
      const [fileName, setFileName] = useState('');
      const [editingPhase, setEditingPhase] = useState(null);
      const [tempEditValues, setTempEditValues] = useState({ startTime: '', endTime: '' });
      const [dragStart, setDragStart] = useState(null);
      const [dragEnd, setDragEnd] = useState(null);
      const [detectionParams, setDetectionParams] = useState({ velocityThreshold: 50, minDuration: 0.04, smoothingWindow: 5 });
      const fileInputRef = useRef(null);

      const processDataForEye = useCallback((raw, eye) => {
        if (!raw || raw.length === 0) return [];
        return raw.map(row => ({ time: row.time, horizontal: eye === 'right' ? row.rightEyeX : row.leftEyeX, vertical: eye === 'right' ? row.rightEyeY : row.leftEyeY })).filter(d => !isNaN(d.horizontal) && !isNaN(d.vertical));
      }, []);

      const parseCSV = useCallback((text) => {
        const lines = text.trim().split('\n');
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        const timeIdx = headers.findIndex(h => h === 'time' || h === 't');
        const rightXIdx = headers.findIndex(h => h === 'righteyex' || h === 'right_eye_x' || h === 'rightx');
        const rightYIdx = headers.findIndex(h => h === 'righteyey' || h === 'right_eye_y' || h === 'righty');
        const leftXIdx = headers.findIndex(h => h === 'lefteyex' || h === 'left_eye_x' || h === 'leftx');
        const leftYIdx = headers.findIndex(h => h === 'lefteyey' || h === 'left_eye_y' || h === 'lefty');
        if (timeIdx === -1) { alert('CSV must contain a "Time" column'); return []; }
        if ((rightXIdx === -1 || rightYIdx === -1) && (leftXIdx === -1 || leftYIdx === -1)) { alert('CSV must contain eye position columns (RightEyeX, RightEyeY or LeftEyeX, LeftEyeY)'); return []; }
        const parsedData = [];
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const values = line.split(',').map(v => parseFloat(v.trim()));
          if (!isNaN(values[timeIdx])) {
            parsedData.push({ time: values[timeIdx], rightEyeX: rightXIdx !== -1 ? values[rightXIdx] : NaN, rightEyeY: rightYIdx !== -1 ? values[rightYIdx] : NaN, leftEyeX: leftXIdx !== -1 ? values[leftXIdx] : NaN, leftEyeY: leftYIdx !== -1 ? values[leftYIdx] : NaN });
          }
        }
        return parsedData.sort((a, b) => a.time - b.time);
      }, []);

      const handleFileUpload = useCallback((event) => {
        const file = event.target.files[0];
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (e) => {
          const parsed = parseCSV(e.target.result);
          setRawData(parsed);
          const hasRight = parsed.some(d => !isNaN(d.rightEyeX) && !isNaN(d.rightEyeY));
          const hasLeft = parsed.some(d => !isNaN(d.leftEyeX) && !isNaN(d.leftEyeY));
          const eye = hasRight ? 'right' : (hasLeft ? 'left' : 'right');
          setSelectedEye(eye);
          const processed = processDataForEye(parsed, eye);
          setData(processed);
          setSelectedPhase(null);
          setEditingPhase(null);
          if (processed.length > 0) { setSlowPhases(detectSlowPhases(processed, detectionParams)); }
        };
        reader.readAsText(file);
        event.target.value = '';
      }, [parseCSV, processDataForEye, detectionParams]);

      const handleEyeChange = useCallback((eye) => {
        setSelectedEye(eye);
        const processed = processDataForEye(rawData, eye);
        setData(processed);
        setSelectedPhase(null);
        setEditingPhase(null);
        if (processed.length > 0) { setSlowPhases(detectSlowPhases(processed, detectionParams)); }
      }, [rawData, processDataForEye, detectionParams]);

      const recalculatePhases = useCallback(() => {
        if (data.length > 0) { setSlowPhases(detectSlowPhases(data, detectionParams)); setSelectedPhase(null); setEditingPhase(null); }
      }, [data, detectionParams]);

      const statistics = useMemo(() => {
        if (slowPhases.length === 0) return { count: 0, avgHorizontalVelocity: 0, avgVerticalVelocity: 0, avgSpeed: 0, totalDuration: 0, stdSpeed: 0 };
        const speeds = slowPhases.map(p => p.avgSpeed);
        const sumH = slowPhases.reduce((acc, p) => acc + p.avgHorizontalVelocity, 0);
        const sumV = slowPhases.reduce((acc, p) => acc + p.avgVerticalVelocity, 0);
        const sumSpeed = speeds.reduce((acc, s) => acc + s, 0);
        const totalDuration = slowPhases.reduce((acc, p) => acc + p.duration, 0);
        const avgSpeed = sumSpeed / slowPhases.length;
        const variance = speeds.reduce((acc, s) => acc + Math.pow(s - avgSpeed, 2), 0) / slowPhases.length;
        return { count: slowPhases.length, avgHorizontalVelocity: sumH / slowPhases.length, avgVerticalVelocity: sumV / slowPhases.length, avgSpeed, totalDuration, stdSpeed: Math.sqrt(variance) };
      }, [slowPhases]);

      const handleMouseDown = useCallback((e) => { if (!isAddingPhase || !e?.activeLabel) return; setDragStart(e.activeLabel); setDragEnd(e.activeLabel); }, [isAddingPhase]);
      const handleMouseMove = useCallback((e) => { if (!isAddingPhase || dragStart === null || !e?.activeLabel) return; setDragEnd(e.activeLabel); }, [isAddingPhase, dragStart]);
      const handleMouseUp = useCallback(() => {
        if (!isAddingPhase || dragStart === null || dragEnd === null) return;
        const startTime = Math.min(dragStart, dragEnd), endTime = Math.max(dragStart, dragEnd);
        if (endTime - startTime < 0.001) { setDragStart(null); setDragEnd(null); return; }
        const velocities = calculatePhaseVelocity(data, startTime, endTime);
        const newPhase = { id: `phase-manual-${Date.now()}`, startTime, endTime, duration: endTime - startTime, ...velocities };
        setSlowPhases(prev => [...prev, newPhase].sort((a, b) => a.startTime - b.startTime));
        setDragStart(null); setDragEnd(null); setIsAddingPhase(false);
      }, [isAddingPhase, dragStart, dragEnd, data]);

      const deletePhase = useCallback((id, e) => { e?.stopPropagation(); setSlowPhases(prev => prev.filter(p => p.id !== id)); if (selectedPhase === id) setSelectedPhase(null); if (editingPhase === id) setEditingPhase(null); }, [selectedPhase, editingPhase]);
      const startEditingPhase = useCallback((phase, e) => { e?.stopPropagation(); setEditingPhase(phase.id); setTempEditValues({ startTime: phase.startTime.toFixed(4), endTime: phase.endTime.toFixed(4) }); }, []);
      const saveEditedPhase = useCallback((e) => {
        e?.stopPropagation();
        if (!editingPhase) return;
        const startTime = parseFloat(tempEditValues.startTime), endTime = parseFloat(tempEditValues.endTime);
        if (isNaN(startTime) || isNaN(endTime) || startTime >= endTime) { alert('Invalid time values.'); return; }
        const velocities = calculatePhaseVelocity(data, startTime, endTime);
        setSlowPhases(prev => prev.map(p => { if (p.id === editingPhase) { return { ...p, startTime, endTime, duration: endTime - startTime, ...velocities }; } return p; }).sort((a, b) => a.startTime - b.startTime));
        setEditingPhase(null);
      }, [editingPhase, tempEditValues, data]);
      const cancelEditing = useCallback((e) => { e?.stopPropagation(); setEditingPhase(null); }, []);

      const exportJSON = useCallback(() => {
        const exportObj = { fileName, selectedEye, exportDate: new Date().toISOString(), detectionParameters: detectionParams, statistics: { numberOfSlowPhases: statistics.count, averageHorizontalVelocity_degPerSec: statistics.avgHorizontalVelocity, averageVerticalVelocity_degPerSec: statistics.avgVerticalVelocity, averageSlowPhaseVelocity_degPerSec: statistics.avgSpeed, standardDeviation_degPerSec: statistics.stdSpeed, totalSlowPhaseDuration_sec: statistics.totalDuration }, slowPhases: slowPhases.map(p => ({ startTime_sec: p.startTime, endTime_sec: p.endTime, duration_sec: p.duration, horizontalVelocity_degPerSec: p.avgHorizontalVelocity, verticalVelocity_degPerSec: p.avgVerticalVelocity, speed_degPerSec: p.avgSpeed })), rawDataPoints: data.length };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `nystagmus-analysis-${selectedEye}-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
      }, [fileName, selectedEye, detectionParams, statistics, slowPhases, data]);

      const exportCSV = useCallback(() => {
        const headers = ['Phase #', 'Start Time (s)', 'End Time (s)', 'Duration (s)', 'H Velocity (deg/s)', 'V Velocity (deg/s)', 'Speed (deg/s)'];
        const rows = slowPhases.map((p, i) => [i + 1, p.startTime.toFixed(4), p.endTime.toFixed(4), p.duration.toFixed(4), p.avgHorizontalVelocity.toFixed(3), p.avgVerticalVelocity.toFixed(3), p.avgSpeed.toFixed(3)]);
        rows.push([]); rows.push(['Summary']); rows.push(['Eye', selectedEye]); rows.push(['Total Slow Phases', statistics.count]); rows.push(['Avg Speed (deg/s)', statistics.avgSpeed.toFixed(3)]);
        const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `slow-phases-${selectedEye}-${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);
      }, [slowPhases, selectedEye, statistics]);

      const chartData = useMemo(() => { if (data.length <= 2000) return data; const step = Math.ceil(data.length / 2000); return data.filter((_, i) => i % step === 0); }, [data]);
      const positionRange = useMemo(() => { if (data.length === 0) return { min: -10, max: 10 }; let minVal = Infinity, maxVal = -Infinity; data.forEach(d => { if (d.horizontal < minVal) minVal = d.horizontal; if (d.horizontal > maxVal) maxVal = d.horizontal; if (d.vertical < minVal) minVal = d.vertical; if (d.vertical > maxVal) maxVal = d.vertical; }); const padding = (maxVal - minVal) * 0.1 || 1; return { min: minVal - padding, max: maxVal + padding }; }, [data]);
      const availableEyes = useMemo(() => { if (!rawData || rawData.length === 0) return { right: false, left: false }; return { right: rawData.some(d => !isNaN(d.rightEyeX) && !isNaN(d.rightEyeY)), left: rawData.some(d => !isNaN(d.leftEyeX) && !isNaN(d.leftEyeY)) }; }, [rawData]);

      return (
        <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg, #0f172a 0%, #1e293b 100%)', fontFamily: "'DM Sans', sans-serif", color: '#e2e8f0' }}>
          <header style={{ padding: '24px 32px', borderBottom: '1px solid rgba(148, 163, 184, 0.1)', background: 'rgba(15, 23, 42, 0.5)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', maxWidth: '1600px', margin: '0 auto', flexWrap: 'wrap', gap: '16px' }}>
              <div>
                <h1 style={{ fontSize: '24px', fontWeight: '700', color: '#f8fafc', display: 'flex', alignItems: 'center', gap: '12px' }}>
                  <span style={{ color: '#38bdf8' }}><Icons.BarChart3 /></span>
                  Nystagmus Velocity Analyzer
                </h1>
                {fileName && <p style={{ fontSize: '14px', color: '#64748b', marginTop: '6px', display: 'flex', alignItems: 'center', gap: '8px' }}><Icons.FileText />{fileName} • {data.length.toLocaleString()} samples • {selectedEye.charAt(0).toUpperCase() + selectedEye.slice(1)} Eye</p>}
              </div>
              <div style={{ display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap' }}>
                {data.length > 0 && (
                  <div className="eye-selector">
                    <button className={`eye-btn ${selectedEye === 'right' ? 'active' : ''}`} onClick={() => handleEyeChange('right')} disabled={!availableEyes.right}>Right Eye</button>
                    <button className={`eye-btn ${selectedEye === 'left' ? 'active' : ''}`} onClick={() => handleEyeChange('left')} disabled={!availableEyes.left}>Left Eye</button>
                  </div>
                )}
                <input ref={fileInputRef} type="file" accept=".csv" onChange={handleFileUpload} style={{ display: 'none' }} />
                <button className="btn btn-primary" onClick={() => fileInputRef.current?.click()}><Icons.Upload />Upload CSV</button>
                {data.length > 0 && (
                  <>
                    <button className="btn btn-secondary" onClick={() => setShowSettings(!showSettings)}><Icons.Settings />Settings</button>
                    <button className="btn btn-secondary" onClick={exportCSV}><Icons.Download />CSV</button>
                    <button className="btn btn-secondary" onClick={exportJSON}><Icons.Download />JSON</button>
                  </>
                )}
              </div>
            </div>
          </header>

          <main style={{ padding: '32px', maxWidth: '1600px', margin: '0 auto' }}>
            {data.length === 0 ? (
              <div className="upload-zone" onClick={() => fileInputRef.current?.click()}>
                <div style={{ color: '#38bdf8', marginBottom: '20px' }}><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
                <h2 style={{ fontSize: '20px', fontWeight: '600', color: '#f8fafc', marginBottom: '12px' }}>Upload Eye Movement Recording</h2>
                <p style={{ color: '#94a3b8', maxWidth: '500px', margin: '0 auto' }}>CSV format: <code style={{ color: '#38bdf8', background: 'rgba(56,189,248,0.1)', padding: '2px 6px', borderRadius: '4px' }}>Time, RightEyeX, RightEyeY, RightEyeZ, LeftEyeX, LeftEyeY, LeftEyeZ</code></p>
                <p style={{ color: '#64748b', fontSize: '13px', marginTop: '16px' }}>X = Horizontal position, Y = Vertical position (Z is ignored)</p>
              </div>
            ) : (
              <>
                {showSettings && (
                  <div className="panel panel-glow" style={{ marginBottom: '24px', padding: '24px' }}>
                    <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '10px' }}><span style={{ color: '#38bdf8' }}><Icons.Settings /></span>Detection Parameters</h3>
                    <div className="settings-panel">
                      <div className="settings-field">
                        <label>Velocity Threshold (°/s)</label>
                        <input type="number" className="input-field" value={detectionParams.velocityThreshold} onChange={(e) => setDetectionParams(prev => ({ ...prev, velocityThreshold: parseFloat(e.target.value) || 0 }))} />
                        <p className="hint-text">Movements slower than this are slow phases</p>
                      </div>
                      <div className="settings-field">
                        <label>Minimum Duration (s)</label>
                        <input type="number" step="0.01" className="input-field" value={detectionParams.minDuration} onChange={(e) => setDetectionParams(prev => ({ ...prev, minDuration: parseFloat(e.target.value) || 0 }))} />
                        <p className="hint-text">Minimum duration for valid slow phase</p>
                      </div>
                      <div className="settings-field">
                        <label>Smoothing Window (samples)</label>
                        <input type="number" className="input-field" value={detectionParams.smoothingWindow} onChange={(e) => setDetectionParams(prev => ({ ...prev, smoothingWindow: parseInt(e.target.value) || 1 }))} />
                        <p className="hint-text">Noise reduction window size</p>
                      </div>
                    </div>
                    <button className="btn btn-primary" onClick={recalculatePhases}><Icons.RefreshCw />Recalculate</button>
                  </div>
                )}

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '16px', marginBottom: '24px' }}>
                  <div className="stat-card"><div className="stat-value">{statistics.count}</div><div className="stat-label">Slow Phases</div></div>
                  <div className="stat-card"><div className="stat-value">{statistics.avgSpeed.toFixed(1)}</div><div className="stat-label">Avg Velocity (°/s)</div></div>
                  <div className="stat-card"><div className="stat-value">{statistics.avgHorizontalVelocity.toFixed(1)}</div><div className="stat-label">Avg H Velocity (°/s)</div></div>
                  <div className="stat-card"><div className="stat-value">{statistics.avgVerticalVelocity.toFixed(1)}</div><div className="stat-label">Avg V Velocity (°/s)</div></div>
                  <div className="stat-card"><div className="stat-value">±{statistics.stdSpeed.toFixed(1)}</div><div className="stat-label">Std Deviation (°/s)</div></div>
                </div>

                <div className="panel panel-glow" style={{ padding: '24px', marginBottom: '24px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }}>
                    <h3 style={{ fontSize: '16px', fontWeight: '600', display: 'flex', alignItems: 'center', gap: '10px' }}><span style={{ color: '#38bdf8' }}><Icons.Eye /></span>Eye Position ({selectedEye.charAt(0).toUpperCase() + selectedEye.slice(1)} Eye)</h3>
                    <div style={{ display: 'flex', gap: '16px', alignItems: 'center', flexWrap: 'wrap' }}>
                      <div style={{ display: 'flex', gap: '8px' }}>
                        <button className={`toggle-btn ${showHorizontal ? 'active' : ''}`} onClick={() => setShowHorizontal(!showHorizontal)}>{showHorizontal ? <Icons.Eye /> : <Icons.EyeOff />}Horizontal</button>
                        <button className={`toggle-btn ${showVertical ? 'active' : ''}`} onClick={() => setShowVertical(!showVertical)}>{showVertical ? <Icons.Eye /> : <Icons.EyeOff />}Vertical</button>
                      </div>
                      <button className={`btn ${isAddingPhase ? 'btn-success active' : 'btn-success'}`} onClick={() => { setIsAddingPhase(!isAddingPhase); setDragStart(null); setDragEnd(null); }}><Icons.Plus />{isAddingPhase ? 'Click & Drag' : 'Add Phase'}</button>
                    </div>
                  </div>
                  {isAddingPhase && <div className="instructions"><Icons.Plus />Click and drag on the chart to add a slow phase manually.</div>}
                  <div style={{ height: '400px', cursor: isAddingPhase ? 'crosshair' : 'default' }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={chartData} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={() => { if (isAddingPhase && dragStart !== null) handleMouseUp(); }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(148, 163, 184, 0.1)" />
                        <XAxis dataKey="time" stroke="#64748b" tick={{ fill: '#64748b', fontSize: 11 }} tickFormatter={(v) => typeof v === 'number' ? v.toFixed(2) : v} />
                        <YAxis stroke="#64748b" tick={{ fill: '#64748b', fontSize: 11 }} domain={[positionRange.min, positionRange.max]} />
                        <Tooltip content={<CustomTooltip />} />
                        {slowPhases.map((phase) => (<ReferenceArea key={phase.id} x1={phase.startTime} x2={phase.endTime} fill={selectedPhase === phase.id ? "rgba(56, 189, 248, 0.25)" : "rgba(34, 197, 94, 0.15)"} stroke={selectedPhase === phase.id ? "#38bdf8" : "#22c55e"} strokeDasharray="3 3" />))}
                        {isAddingPhase && dragStart !== null && dragEnd !== null && (<ReferenceArea x1={Math.min(dragStart, dragEnd)} x2={Math.max(dragStart, dragEnd)} fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" strokeWidth={2} />)}
                        {showHorizontal && <Line type="monotone" dataKey="horizontal" stroke="#38bdf8" dot={false} strokeWidth={1.5} name="Horizontal (X)" isAnimationActive={false} />}
                        {showVertical && <Line type="monotone" dataKey="vertical" stroke="#f472b6" dot={false} strokeWidth={1.5} name="Vertical (Y)" isAnimationActive={false} />}
                        <Brush dataKey="time" height={40} stroke="rgba(56, 189, 248, 0.5)" fill="rgba(15, 23, 42, 0.8)" />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{ display: 'flex', gap: '24px', marginTop: '16px', fontSize: '13px', color: '#94a3b8', flexWrap: 'wrap' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><div style={{ width: '24px', height: '3px', background: '#38bdf8', borderRadius: '2px' }} />Horizontal (X)</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><div style={{ width: '24px', height: '3px', background: '#f472b6', borderRadius: '2px' }} />Vertical (Y)</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><div style={{ width: '24px', height: '12px', background: 'rgba(34, 197, 94, 0.3)', border: '1px dashed #22c55e', borderRadius: '2px' }} />Slow Phase</div>
                  </div>
                </div>

                <div className="panel panel-glow">
                  <div style={{ padding: '20px 24px', borderBottom: '1px solid rgba(148, 163, 184, 0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <h3 style={{ fontSize: '16px', fontWeight: '600', display: 'flex', alignItems: 'center', gap: '10px' }}>Detected Slow Phases<span className="badge">{slowPhases.length}</span></h3>
                  </div>
                  <div className="header-row"><div>#</div><div>Start (s)</div><div>End (s)</div><div>Duration (s)</div><div>Speed (°/s)</div><div>Actions</div></div>
                  <div className="phase-list">
                    {slowPhases.length === 0 ? (
                      <div style={{ padding: '40px', textAlign: 'center', color: '#64748b' }}>No slow phases detected. Try adjusting parameters or add manually.</div>
                    ) : (
                      slowPhases.map((phase, index) => (
                        <div key={phase.id} className={`phase-row ${selectedPhase === phase.id ? 'selected' : ''} ${editingPhase === phase.id ? 'editing' : ''}`} onClick={() => setSelectedPhase(selectedPhase === phase.id ? null : phase.id)}>
                          <div style={{ color: '#64748b' }}>{index + 1}</div>
                          {editingPhase === phase.id ? (
                            <>
                              <div><input type="text" className="input-field" value={tempEditValues.startTime} onChange={(e) => setTempEditValues(prev => ({ ...prev, startTime: e.target.value }))} onClick={(e) => e.stopPropagation()} style={{ padding: '6px 10px' }} /></div>
                              <div><input type="text" className="input-field" value={tempEditValues.endTime} onChange={(e) => setTempEditValues(prev => ({ ...prev, endTime: e.target.value }))} onClick={(e) => e.stopPropagation()} style={{ padding: '6px 10px' }} /></div>
                              <div>—</div><div>—</div>
                              <div className="action-btns">
                                <button className="btn btn-icon btn-success" onClick={saveEditedPhase}><Icons.Check /></button>
                                <button className="btn btn-icon btn-danger" onClick={cancelEditing}><Icons.X /></button>
                              </div>
                            </>
                          ) : (
                            <>
                              <div>{phase.startTime.toFixed(4)}</div>
                              <div>{phase.endTime.toFixed(4)}</div>
                              <div style={{ color: '#94a3b8' }}>{phase.duration.toFixed(4)}</div>
                              <div style={{ color: '#38bdf8', fontWeight: '500' }}>{phase.avgSpeed.toFixed(2)}</div>
                              <div className="action-btns">
                                <button className="btn btn-icon btn-secondary" onClick={(e) => startEditingPhase(phase, e)}><Icons.Edit3 /></button>
                                <button className="btn btn-icon btn-danger" onClick={(e) => deletePhase(phase.id, e)}><Icons.Trash2 /></button>
                              </div>
                            </>
                          )}
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </>
            )}
          </main>
          <footer style={{ padding: '20px 32px', borderTop: '1px solid rgba(148, 163, 184, 0.1)', textAlign: 'center', color: '#64748b', fontSize: '13px' }}>Nystagmus Velocity Analyzer • All processing done locally in your browser</footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NystagmusAnalyzer />);
  </script>
</body>
</html>
